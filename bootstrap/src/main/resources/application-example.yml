# kit-oss 配置
oss:
  enabled: true
  endpoint: http://localhost:9000
  region: us-east-1
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: test-bucket
  path-style-access: true

# kit-security 配置
security:
  enabled: true
  exclude-patterns:
    - /api/auth/login
    - /api/auth/register
    - /api/async-test/**
    - /api/file/**
  token:
    expiration: 1800    # 30 分钟（秒）
    refresh-expiration: 604800  # 7 天（秒）
